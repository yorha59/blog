baseURL = 'https://yorha59.github.io/blog/'
languageCode = 'en-us'
title = 'hemoon忙里偷闲'
theme = 'PaperMod'

[params]
  author = 'Simon'
  description = 'A personal blog sharing tech notes and life moments'
  defaultTheme = 'light'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi there 👋"
    Content = "Welcome to my personal blog where I share my programming journey, project experiences, and random thoughts."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yorha59"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your@email.com"

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '🏠 Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'archives'
    name = '📁 Archives'
    url = '/archives/'
    weight = 20
  [[menu.main]]
    identifier = 'tags'
    name = '🏷️ Tags'
    url = '/tags/'
    weight = 30
  [[menu.main]]
    identifier = 'search'
    name = '🔍 Search'
    url = '/search/'
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
    noClasses = false
