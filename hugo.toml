baseURL = 'https://yorha59.github.io/blog/'
languageCode = 'zh-cn'
title = 'Simon的技术博客'
theme = 'PaperMod'

[params]
  author = 'Simon'
  description = '记录技术成长，分享开发心得'
  defaultTheme = 'light'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi there 👋"
    Content = "欢迎来到我的技术博客，这里记录我的编程学习、项目实践和技术思考。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yorha59"

  [[params.socialIcons]]
    name = "twitter"
    url = "https://twitter.com/yourusername"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:your@email.com"

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '🏠 首页'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'archives'
    name = '📁 归档'
    url = '/archives/'
    weight = 20
  [[menu.main]]
    identifier = 'tags'
    name = '🏷️ 标签'
    url = '/tags/'
    weight = 30
  [[menu.main]]
    identifier = 'search'
    name = '🔍 搜索'
    url = '/search/'
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = 'github'
    lineNos = true
    codeFences = true
    guessSyntax = true
    noClasses = false
